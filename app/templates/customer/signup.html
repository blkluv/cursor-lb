{% extends "base.html" %}
{% block title %}Client sign up — Matt Photography{% endblock %}
{% block content %}
<div class="max-w-md mx-auto mt-12">
  <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-8">
    <h1 class="text-2xl font-bold mb-2">Create client account</h1>
    <p class="text-slate-500 mb-6">Book shoots with Matt Photography and follow your booking status.</p>
    {% if error %}
    <div class="mb-4 p-3 rounded-lg bg-red-50 text-red-700 text-sm border border-red-100">{{ error }}</div>
    {% endif %}
    <form method="post" action="/customer/signup" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1" for="name">Your name</label>
        <input id="name" name="name" type="text" required
          class="w-full rounded-lg border border-slate-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-amber-500">
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1" for="email">Email</label>
        <input id="email" name="email" type="email" required
          class="w-full rounded-lg border border-slate-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-amber-500">
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1" for="password">Password</label>
        <input id="password" name="password" type="password" required minlength="6"
          class="w-full rounded-lg border border-slate-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-amber-500">
      </div>
      <button type="submit"
        class="w-full bg-amber-600 hover:bg-amber-700 text-white font-medium py-2.5 rounded-lg transition">
        Sign up
      </button>
    </form>
    <p class="mt-6 text-center text-sm text-slate-500">
      Already have an account? <a href="/customer/login" class="text-amber-600 font-medium hover:underline">Log in</a>
    </p>
  </div>
</div>
{% endblock %}
